<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÔN TẬP HẰNG ĐẲNG THỨC</title>
    <style>
        :root {
            --primary: #FFD700;
            --team-a: #FF4742;
            --team-b: #2D9CDB;
            --bg: #F0F2F5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Điểm số ở góc màn hình */
        .score-container {
            position: absolute;
            top: 20px;
            width: 95%;
            display: flex;
            justify-content: space-between;
            pointer-events: none; /* Không chặn click vào các nút bên dưới */
        }

        .team-score {
            background: white;
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            min-width: 180px;
            pointer-events: auto;
            border: 5px solid;
        }

        .score-a { border-color: var(--team-a); color: var(--team-a); }
        .score-b { border-color: var(--team-b); color: var(--team-b); }

        .team-name { font-size: 24px; font-weight: bold; margin: 0; }
        .score-val { font-size: 70px; font-weight: 900; margin: 10px 0; display: block; }

        /* Khu vực chính */
        .game-area {
            margin-top: 180px;
            width: 90%;
            max-width: 1000px;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 10;
        }

        .question-text {
            font-size: 38px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            min-height: 100px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .opt-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            font-size: 28px;
            border: 3px solid #eee;
            color: #444;
        }

        .answer-box {
            font-size: 30px;
            color: #27ae60;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            background: #eafaf1;
            border-radius: 10px;
            display: none;
        }

        /* Nút điều khiển */
        .main-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-next { background: #ff9800; color: white; }
        .btn-ans { background: #9c27b0; color: white; }
        .btn-reset { background: #7f8c8d; color: white; }

        .judge-panel {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
        }

        .btn-team { color: white; margin: 0 10px; }

        /* Vòng quay Overlay */
        #wheel-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .wheel-wrap {
            position: relative;
            width: 450px;
            height: 450px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 15px solid white;
            background: conic-gradient(
                #e74c3c 0deg 120deg, 
                #f1c40f 120deg 240deg, 
                #2ecc71 240deg 360deg
            );
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            position: relative;
        }

        .wheel-num {
            position: absolute;
            font-size: 70px;
            font-weight: 900;
            color: #2c3e50;
        }
        .n1 { top: 15%; right: 20%; transform: rotate(60deg); }
        .n2 { bottom: 10%; left: 40%; transform: rotate(180deg); }
        .n3 { top: 15%; left: 20%; transform: rotate(-60deg); }

        .pointer {
            position: absolute;
            top: -30px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid white;
            z-index: 100;
        }

        #btn-confirm-exit {
            display: none;
            background: #27ae60;
            color: white;
            padding: 25px 50px;
            font-size: 26px;
            margin-top: 30px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* Thắng cuộc */
        #win-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--primary);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #win-screen h1 { font-size: 100px; color: #d35400; margin: 0; }
    </style>
</head>
<body>

    <div class="score-container">
        <div class="team-score score-a">
            <p class="team-name">ĐỘI A</p>
            <span id="score-a" class="score-val">0</span>
        </div>
        <div class="team-score score-b">
            <p class="team-name">ĐỘI B</p>
            <span id="score-b" class="score-val">0</span>
        </div>
    </div>

    <div class="game-area">
        <div id="q-text" class="question-text">Nhấn nút bên dưới để bắt đầu câu hỏi đầu tiên!</div>
        <div id="opts-grid" class="options-grid"></div>
        <div id="ans-box" class="answer-box"></div>

        <div class="main-controls">
            <button class="btn btn-next" onclick="nextQuestion()">Câu tiếp theo ⮕</button>
            <button class="btn btn-ans" onclick="showAnswer()">Xem đáp án</button>
            <button class="btn btn-reset" onclick="resetGame()">Chơi lại</button>
        </div>

        <div id="judge-panel" class="judge-panel" style="display: none;">
            <p style="font-weight: bold; font-size: 20px;">Đội nào trả lời đúng?</p>
            <button class="btn btn-team" style="background:var(--team-a)" onclick="openWheel('A')">Đội A</button>
            <button class="btn btn-team" style="background:var(--team-b)" onclick="openWheel('B')">Đội B</button>
        </div>
    </div>

    <div id="wheel-overlay">
        <h1 id="wheel-msg" style="color:white; font-size: 40px; margin-bottom: 30px;">Cộng điểm cho Đội ...</h1>
        <div class="wheel-wrap">
            <div class="pointer"></div>
            <div id="wheel">
                <div class="wheel-num n1">1</div>
                <div class="wheel-num n2">2</div>
                <div class="wheel-num n3">3</div>
            </div>
        </div>
        <button id="btn-spin" class="btn" style="background:white; color:#333; margin-top:30px; font-size:30px;" onclick="startSpin()">BẮT ĐẦU QUAY</button>
        <div id="res-msg" style="color:#f1c40f; font-size: 50px; font-weight:900; margin-top:20px;"></div>
        <button id="btn-confirm-exit" class="btn" onclick="finishWheel()">NHẬN ĐIỂM & ĐÓNG X</button>
    </div>

    <div id="win-screen">
        <h1 id="win-team">ĐỘI A THẮNG!</h1>
        <p style="font-size: 30px; font-weight: bold;">XIN CHÚC MỪNG!</p>
        <button class="btn" style="background:white; margin-top:30px;" onclick="resetGame()">LÀM VÁN MỚI</button>
    </div>

    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <script>
        const bank = [
            { q: "Khai triển (x + 5)² bằng biểu thức nào?", opts: ["x² + 10x + 25", "x² + 25", "x² + 5x + 25", "x² - 10x + 25"], a: "x² + 10x + 25" },
            { q: "Khai triển (2x + 3)² bằng biểu thức nào?", opts: ["4x² + 12x + 9", "4x² + 9", "4x² + 6x + 9", "2x² + 12x + 9"], a: "4x² + 12x + 9" },
            { q: "Biểu thức x² + 6x + 9 là bình phương của tổng nào?", opts: ["(x + 3)²", "(x + 6)²", "(x + 9)²", "(2x + 3)²"], a: "(x + 3)²" },
            { q: "Tính nhanh giá trị 101²?", opts: ["10201", "10101", "10001", "10002"], a: "10201" },
            { q: "Rút gọn (3x + 2y)² ?", opts: ["9x² + 12xy + 4y²", "9x² + 4y²", "9x² + 6xy + 4y²", "3x² + 12xy + 2y²"], a: "9x² + 12xy + 4y²" },
            { q: "Khai triển (x - 4)² bằng biểu thức nào?", opts: ["x² - 8x + 16", "x² + 8x + 16", "x² - 4x + 16", "x² - 16"], a: "x² - 8x + 16" },
            { q: "Biểu thức x² - 10x + 25 là bình phương của hiệu nào?", opts: ["(x - 5)²", "(x - 10)²", "(x - 25)²", "(5x - 1)²"], a: "(x - 5)²" },
            { q: "Tính giá trị 99² bằng hằng đẳng thức?", opts: ["9801", "9900", "9801", "9989"], a: "9801" },
            { q: "Khai triển (3x - 2)² bằng biểu thức nào?", opts: ["9x² - 12x + 4", "9x² + 12x + 4", "9x² - 6x + 4", "3x² - 12x + 4"], a: "9x² - 12x + 4" },
            { q: "Phân tích x² - 9 thành nhân tử?", opts: ["(x + 3)(x - 3)", "(x - 3)²", "(x + 3)²", "x(x - 9)"], a: "(x + 3)(x - 3)" },
            { q: "Phân tích 4x² - 25 thành nhân tử?", opts: ["(2x + 5)(2x - 5)", "(4x + 5)(x - 5)", "(2x - 5)²", "(2x + 5)²"], a: "(2x + 5)(2x - 5)" },
            { q: "Kết quả của (a + b)(a - b) là?", opts: ["a² - b²", "a² + b²", "(a - b)²", "a² - 2ab + b²"], a: "a² - b²" },
            { q: "Tính nhanh 51 x 49?", opts: ["2499", "2500", "2401", "2550"], a: "2499" },
            { q: "Rút gọn (2x + 3y)(2x - 3y)?", opts: ["4x² - 9y²", "4x² + 9y²", "2x² - 3y²", "(2x - 3y)²"], a: "4x² - 9y²" }
        ];

        let scoreA = 0, scoreB = 0, currentWinner = '', tempPoints = 0;
        let music = document.getElementById('bg-music');

        function nextQuestion() {
            let item = bank[Math.floor(Math.random() * bank.length)];
            document.getElementById('q-text').innerText = item.q;
            document.getElementById('ans-box').style.display = 'none';
            document.getElementById('ans-box').innerText = "Đáp án: " + item.a;
            document.getElementById('judge-panel').style.display = 'block';

            let grid = document.getElementById('opts-grid');
            grid.innerHTML = '';
            item.opts.forEach((o, i) => {
                let char = String.fromCharCode(65 + i);
                grid.innerHTML += `<div class="opt-card">${char}. ${o}</div>`;
            });
        }

        function showAnswer() {
            document.getElementById('ans-box').style.display = 'block';
        }

        function openWheel(team) {
            currentWinner = team;
            document.getElementById('wheel-msg').innerText = "Vòng quay cho Đội " + team;
            document.getElementById('wheel-overlay').style.display = 'flex';
            document.getElementById('btn-spin').style.display = 'block';
            document.getElementById('btn-confirm-exit').style.display = 'none';
            document.getElementById('res-msg').innerText = "";
            document.getElementById('wheel').style.transform = `rotate(0deg)`;
        }

        function startSpin() {
            document.getElementById('btn-spin').style.display = 'none';
            music.play();

            let deg = Math.floor(Math.random() * 360) + 1800; // Quay 5 vòng + ngẫu nhiên
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                let actual = deg % 360;
                // Vòng quay chia 3 phần: 1, 2, 3
                if (actual >= 0 && actual < 120) tempPoints = 1;
                else if (actual >= 120 && actual < 240) tempPoints = 2;
                else tempPoints = 3;

                document.getElementById('res-msg').innerText = "CỘNG " + tempPoints + " ĐIỂM!";
                document.getElementById('btn-confirm-exit').style.display = 'block';
                // Nhạc vẫn tiếp tục chạy cho đến khi bấm nút thoát
            }, 4100);
        }

        function finishWheel() {
            music.pause();
            music.currentTime = 0;

            if (currentWinner === 'A') {
                scoreA += tempPoints;
                document.getElementById('score-a').innerText = scoreA;
            } else {
                scoreB += tempPoints;
                document.getElementById('score-b').innerText = scoreB;
            }

            document.getElementById('wheel-overlay').style.display = 'none';
            checkWin();
        }

        function checkWin() {
            if (scoreA >= 10) {
                document.getElementById('win-team').innerText = "ĐỘI A CHIẾN THẮNG!";
                document.getElementById('win-screen').style.display = 'flex';
            } else if (scoreB >= 10) {
                document.getElementById('win-team').innerText = "ĐỘI B CHIẾN THẮNG!";
                document.getElementById('win-screen').style.display = 'flex';
            }
        }

        function resetGame() {
            scoreA = 0; scoreB = 0;
            document.getElementById('score-a').innerText = '0';
            document.getElementById('score-b').innerText = '0';
            document.getElementById('win-screen').style.display = 'none';
            document.getElementById('judge-panel').style.display = 'none';
            document.getElementById('opts-grid').innerHTML = '';
            document.getElementById('q-text').innerText = 'Nhấn nút bên dưới để bắt đầu!';
            document.getElementById('ans-box').style.display = 'none';
        }
    </script>
</body>
</html>
